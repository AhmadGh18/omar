<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In</title>

  <style>
    /* simple reset so the form looks the same everywhere */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card h1 {
      text-align: center;
      color: #333;
      margin-bottom: 5px;
    }

    .card p.subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
      font-weight: bold;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      background: #fafafa;
      transition: border 0.2s, background 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: #667eea;
      background: #ffffff;
    }

    /* the "remember me" + "forgot password" line */
    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .options label {
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .options a {
      color: #667eea;
      text-decoration: none;
    }

    .options a:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #5568d3;
    }

    .signup-text {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #777;
    }

    .signup-text a {
      color: #667eea;
      text-decoration: none;
    }

    .signup-text a:hover {
      text-decoration: underline;
    }

    /* make it comfortable on small phone screens */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 25px 20px;
      }

      .card h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to your account</p>

    <form>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="john@example.com" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn">Log In</button>

      <p class="signup-text">Don't have an account? <a href="/">Sign up</a></p>

    </form>
  </div>

</body>
</html>
