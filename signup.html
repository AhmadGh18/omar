<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — FitTrack</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 100%;
      max-width: 550px;
      padding: 35px;
      border-radius: 16px;
      border: 1px solid #eee;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .card h1 {
      text-align: center;
      color: #333;
      margin-bottom: 5px;
    }

    .card p.subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 15px;
    }

    .field {
      margin-bottom: 18px;
      flex: 1;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
      font-weight: bold;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      background: #fafafa;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: #ff6b35;
      background: #ffffff;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #ff6b35;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: #e85320;
    }

    .login-text {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #777;
    }

    .login-text a {
      color: #ff6b35;
      text-decoration: none;
    }


    @media (max-width: 500px) {
      .row {
        flex-direction: column;
        gap: 0;
      }

      body {
        padding: 12px;
      }

      .card {
        padding: 25px 20px;
      }

      .card h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Join FitTrack</h1>
    <p class="subtitle">Create your account and start training today</p>

    <form>

      <div class="row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="John" required>
        </div>

        <div class="field">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" required>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" required>
        </div>

        <div class="field">
          <label for="gender">Gender</label>
          <select id="gender" required>
            <option value="">Select...</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="john@example.com" required>
      </div>

      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="+1 234 567 890" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter a password" required>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="btn">Sign Up</button>

      <p class="login-text">Already have an account? <a href="login.html">Log in</a></p>

    </form>
  </div>

</body>
</html>
